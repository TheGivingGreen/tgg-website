document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

y:0;animation:up .6s ease 2.15s forwards}\n#putt .stamp{opacity:0;animation:stampIn .32s cubic-bezier(.2,1.6,.4,1) 2.55s forwards}\n@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}\n@keyframes stampIn{from{opacity:0;transform:scale(1.12)}to{opacity:1;transform:scale(1)}}\n.stamp{border:2px solid var(--forest);padding:9px 22px;font-size:14px;font-weight:700;letter-spacing:.16em;text-transform:uppercase}\n\n/* ============ NAV ============ */\nnav{position:fixed;top:0;left:0;right:0;width:100%;background:transparent;border-bottom:none;z-index:50;\n  display:flex;align-items:center;justify-content:space-between;padding:22px clamp(20px,4vw,48px);\n  transition:background .3s,border .3s,box-shadow .3s}\nnav.scrolled{background:var(--sand);border-bottom:2px solid var(--forest);box-shadow:0 2px 12px rgba(20,40,34,.08)}\nnav .left{display:flex;align-items:center;gap:16px}\nnav svg{width:52px;height:auto}\nnav .name{font-family:'Playfair Display',serif;font-weight:700;font-size:26px;color:var(--cream);transition:color .3s}\nnav.scrolled .name{color:var(--forest)}\nnav .links{display:flex;gap:34px;align-items:center}\nnav .links a{color:var(--cream);text-decoration:none;font-size:16px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;\n  position:relative;padding-bottom:3px;transition:color .3s}\nnav.scrolled .links a{color:var(--forest)}\nnav .links a:not(.btn)::after{content:\"\";position:absolute;left:0;bottom:0;height:3px;width:0;background:var(--flag);transition:width .22s ease}\nnav .links a:not(.btn):hover::after{width:100%}\nnav .links a:hover{color:var(--forest)}\n.btn{display:inline-block;border-radius:999px;padding:14px 30px;font-size:14px;font-weight:700;\n  letter-spacing:.1em;text-transform:uppercase;text-decoration:none;cursor:pointer;border:2px solid transparent;\n  font-family:'DM Sans',sans-serif;transition:background .2s,color .2s}\n.btn.primary{background:var(--flag);color:var(--cream)}\n.btn.primary:hover{background:var(--flag-deep);animation:wave .32s ease-in-out}\n@keyframes wave{0%,100%{transform:skewX(0)}40%{transform:skewX(-4deg)}75%{transform:skewX(2.5deg)}}\n.btn.ghost{border-color:var(--cream);color:var(--cream);background:transparent;padding:14px 28px;font-size:14px;transition:all .3s}\nnav.scrolled .btn.ghost{border-color:var(--forest);color:var(--forest)}\nnav.scrolled .btn.ghost:hover{background:var(--forest);color:var(--cream)}\n.btn.ghost:hover{background:var(--forest);color:var(--cream)}\n.btn.ghost.on-dark{border-color:var(--cream)!important;color:var(--cream)!important}\n.btn.ghost.on-dark:hover{background:var(--cream)!important;color:var(--forest)!important}\n@media(max-width:760px){nav .links a:not(.btn){display:none}nav .name{display:none}}\n\n\n/* ============ PHOTO HERO ============ */\nheader.hero{position:relative;background:var(--forest);color:var(--cream);overflow:hidden;\n  margin:0;padding:0;width:100%;text-align:center;\n  min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;justify-content:center}\n.hero-content{position:relative;z-index:1;padding:100px clamp(20px,4vw,48px) 100px;max-width:1000px;margin:0 auto}\n.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center 40%;opacity:.4;pointer-events:none}\n.hero .eyebrow{color:var(--bunker);position:relative}\n.hero h1{position:relative;color:var(--cream)}\n.hero .grace{position:relative;color:var(--sand)}\n.hero .stampline .stamp{border-color:var(--cream);color:var(--cream);position:relative}\n.hero .sub{color:var(--cream);position:relative;opacity:.92}\n.hero .fineprint{color:var(--bunker);position:relative}\n.hero .cta-row{position:relative}\n.hero .btn.ghost{border-color:var(--cream)!important;color:var(--cream)!important}\n.hero .btn.ghost:hover{background:var(--cream);color:var(--forest)}\n.hero-data{position:absolute;bottom:0;left:0;right:0;width:100%;display:flex;justify-content:center;gap:clamp(40px,8vw,120px);\n  background:rgba(20,40,34 ion.story{grid-template-columns:1fr}}\n\n/* ===== PHOTO STRIP 3-UP ===== */\nsection.strip{background:var(--shadow-ink);padding:0;display:grid;grid-template-columns:1.1fr 1fr 1.1fr;gap:3px;height:clamp(400px,55vw,700px)}\nsection.strip figure{margin:0;position:relative;overflow:hidden;height:100%}\nsection.strip img{width:100%;height:100%;object-fit:cover;object-position:center center;display:block;transition:transform .4s ease;filter:url(#duotone)}\nsection.strip figure:hover img{transform:scale(1.04)}\n@media(max-width:680px){section.strip{grid-template-columns:1fr 1fr;height:clamp(300px,80vw,500px)}}\n\n/* ===== SCORING ===== */\nsection.rules{padding:clamp(72px,12vh,140px) clamp(20px,4vw,48px)}\n.rules .inner{max-width:860px;margin:0 auto}\n.rules .section-serif{color:var(--fairway)}\n.score-table{background:var(--cream);border:2px solid var(--forest);width:100%}\n.score-table .sh{background:var(--forest);color:var(--cream);display:flex;justify-content:space-between;padding:13px 20px;font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase}\n.score-table .row{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-bottom:1px solid var(--line);font-size:16px}\n.score-table .row:last-child{border-bottom:none}\n.score-table .score{font-family:'Anton',sans-serif;font-size:26px;min-width:60px;text-align:right}\n.s-good{color:var(--fairway)}.s-flag{color:var(--flag)}.s-bad{color:var(--bunker)}\n.rules .game-photo{margin-top:32px;overflow:hidden;border:2px solid var(--forest)}\n.rules .game-photo img{width:100%;display:block;max-height:360px;object-fit:cover;filter:url(#duotone)}\n.rules .jacket{margin-top:28px;background:var(--forest);color:var(--cream);padding:20px 24px;display:flex;align-items:center;gap:16px}\n.rules .jacket .j-icon{font-size:28px;flex:none}\n.rules .jacket .j-text{font-size:15px;line-height:1.55}\n.rules .jacket .j-text strong{display:block;font-family:'Anton',sans-serif;font-weight:400;font-size:20px;text-transform:uppercase;color:var(--bunker);margin-bottom:4px}\n\n/* ===== 2-UP PHOTOS ===== */\n.photo-two{display:grid;grid-template-columns:1fr 1fr;gap:3px;background:var(--shadow-ink)}\n.photo-two figure{margin:0;overflow:hidden;height:400px}\n.photo-two img{width:100%;height:100%;object-fit:cover;transition:transform .4s;filter:url(#duotone)}\n.photo-two figure:hover img{transform:scale(1.03)}\n@media(max-width:560px){.photo-two{grid-template-columns:1fr}}\n\n/* ===== CHARITIES ===== */\nsection.good{background:var(--forest);color:var(--cream);padding:clamp(72px,12vh,140px) clamp(20px,4vw,48px);text-align:center}\n.good .section-serif{color:var(--bunker)}\n.good p{max-width:60ch;margin:0 auto 36px;color:rgba(255,252,245,.82);line-height:1.7}\n.charity-strip{display:flex;flex-wrap:wrap;gap:10px 14px;justify-content:center;max-width:920px;margin:0 auto 28px}\n.charity-strip span{border:1px solid rgba(255,252,245,.35);border-radius:999px;padding:8px 18px;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;transition:border-color .2s,background .2s;cursor:default}\n.charity-strip span:hover{border-color:var(--flag);background:rgba(252,86,86,.1)}\n.charity-note{font-size:13px;color:rgba(255,252,245,.35);font-style:italic;font-family:'Playfair Display',serif}\n\n/* ===== TICKETS ===== */\nsection.tickets{padding:clamp(72px,12vh,140px) clamp(20px,4vw,48px);max-width:1100px;margin:0 auto}\n.tickets .section-serif{color:var(--fairway)}\n.ticket-grid{display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:20px}\n.t-card{border:1.5px solid var(--line);padding:28px 22px;background:var(--cream);display:flex;flex-direction:column;gap:10px}\n.t-card.featured{border-color:var(--forest);border-width:2px}\n.t-badge{align-self:flex-start;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding:4px 10px}\n.t-badge.hot{background:var(--forest);color:var(--cream)}\n.t-badge.std{background:var(--sand-deep);color:var(--bunker)}\n.t-name{font-family:'Anton',sans-serif;font-weight:400;text-transform:uppercase;font-size:clamp(20px,2.5vw,28px);line-height:1.05}\n.t-price{font-family:'Anton',sans-serif;font-size:clamp(28px,3.5vw,44px);color:var(--flag);line-height:1}\n.t-price span{font-family:'DM Sans',sans-serif;font-size:15px;color:var(--bunker);font-weight:400}\n.t-includes{list-style:none;display:flex;flex-direction:column;gap:7px;margin-top:4px}\n.t-includes li{font-size:14px;color:var(--shadow-ink);display:flex;align-items:flex-start;gap:8px;line-height:1.5}\n.t-includes li::before{content:\"\";display:block;width:5px;height:5px;background:var(--bunker);border-radius:50%;flex:none;margin-top:7px}\n.t-card .btn{margin-top:auto;text-align:center;display:block}\n.tickets .t-note{margin-top:24px;font-size:14px;color:var(--bunker);text-align:center;font-style:italic;font-family:'Playfair Display',serif}\n@media(max-width:760px){.ticket-grid{grid-template-columns:1fr}}\n\n/* ===== BACK NINE ===== */\n.backnine{background:var(--bunker);color:var(--cream);padding:clamp(44px,6vh,72px) clamp(20px,4vw,48px);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:24px}\n.backnine h3{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(20px,2.5vw,28px);margin-bottom:6px}\n.backnine p{font-size:15px;color:rgba(255,252,245,.78);max-width:48ch}\n.btn-bn{border:2px solid rgba(255,252,245,.5);color:var(--cream);background:transparent;white-space:nowrap;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:12px 24px;border-radius:999px;text-decoration:none;transition:background .2s,border-color .2s}\n.btn-bn:hover{background:rgba(255,252,245,.1);border-color:var(--cream)}\n\n/* ===== FAQ ===== */\nsection.faq{padding:clamp(72px,12vh,140px) clamp(20px,4vw,48px)}\n.faq .inner{max-width:820px;margin:0 auto}\n.faq .section-serif{color:var(--fairway)}\n.faq-list{border-top:2px solid var(--forest)}\n.faq-item{border-bottom:2px solid var(--forest)}\n.faq-q{width:100%;background:none;border:none;cursor:pointer;display:flex;justify-content:space-between;align-items:center;padding:20px 4px;text-align:left;gap:16px;font-family:'DM Sans',sans-serif}\n.faq-q-text{font-size:clamp(15px,1.8vw,18px);font-weight:700;color:var(--forest);line-height:1.4}\n.faq-icon{font-family:'Anton',sans-serif;font-size:22px;color:var(--flag);flex:none;transition:transform .3s;line-height:1}\n.faq-item.open .faq-icon{transform:rotate(45deg)}\n.faq-a{max-height:0;overflow:hidden;transition:max-height .35s ease,padding .3s}\n.faq-item.open .faq-a{max-height:400px;padding-bottom:20px}\n.faq-a p{font-size:15px;line-height:1.7;color:var(--shadow-ink);padding:0 4px;max-width:66ch}\n.faq-a p+p{margin-top:10px}\n\n/* ===== CAPTURE ===== */\nsection.capture{background:var(--flag);color:var(--cream);padding:clamp(72px,10vh,110px) clamp(20px,4vw,48px);text-align:center}\n.capture .eyebrow{color:rgba(255,252,245,.6);margin-bottom:14px;font-size:13px;font-weight:700;letter-spacing:.14em;text-transform:uppercase}\n.capture h2{font-family:'Anton',sans-serif;font-weight:400;text-transform:uppercase;font-size:clamp(40px,7vw,88px);line-height:.92;margin-bottom:16px}\n.capture .sub{font-size:clamp(15px,1.8vw,18px);opacity:.9;margin-bottom:32px;line-height:1.6;max-width:46ch;margin-left:auto;margin-right:auto}\n.email-form{display:flex;gap:0;max-width:440px;margin:0 auto;border:2px solid rgba(255,252,245,.4);background:rgba(255,252,245,.1);border-radius:999px;overflow:hidden;padding:4px 4px 4px 18px}\n.email-form input{flex:1;background:transparent;border:none;outline:none;color:var(--cream);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;min-width:0}\n.email-form input::placeholder{color:rgba(255,252,245,.5)}\n.email-form button{background:var(--cream);color:var(--flag);border:none;border-radius:999px;padding:11px 18px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;white-space:nowrap;flex:none;transition:background .2s}\n.email-form button:hover{background:var(--sand)}\n#form-msg{min-height:20px;margin-top:12px;font-size:14px;font-weight:600}\n.capture .fine{margin-top:12px;font-size:12px;opacity:.5;letter-spacing:.05em}\n\n/* ===== FOOTER ===== */\nfooter{background:var(--shadow-ink);color:var(--cream);padding:clamp(44px,7vh,72px) clamp(20px,4vw,48px) 32px}\n.footer-creed{text-align:center;margin-bottom:52px;padding-bottom:48px;border-bottom:1px solid rgba(255,252,245,.08)}\n.footer-creed .creed{font-family:'Anton',sans-serif;font-weight:400;text-transform:uppercase;font-size:clamp(44px,9vw,110px);line-height:.88;color:var(--cream)}\n.footer-creed .creed .zero{display:inline-block;vertical-align:baseline;margin:0 .015em}\n.footer-creed .creed .zero svg{height:.95em;width:auto;display:inline-block;vertical-align:baseline;transform:translateY(.04em)}\n.footer-creed .fg{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(18px,2.5vw,28px);color:var(--bunker);display:block;margin-top:10px}\n.footer-creed .sub{font-size:14px;color:rgba(255,252,245,.35);margin-top:8px}\n.footer-row{max-width:1100px;margin:0 auto;display:flex;justify-content:space-between;align-items:flex-start;gap:32px;flex-wrap:wrap}\n.f-brand{display:flex;flex-direction:column;gap:8px;max-width:260px}\n.f-logo{width:38px;height:auto}\n.f-name{font-family:'Playfair Display',serif;font-size:18px;font-weight:700}\n.f-sub{font-size:13px;color:rgba(255,252,245,.35);line-height:1.6}\n.f-links{display:flex;flex-direction:column;gap:8px}\n.f-links a{color:rgba(255,252,245,.55);text-decoration:none;font-size:14px;font-weight:600;letter-spacing:.06em;transition:color .2s}\n.f-links a:hover{color:var(--cream)}\n.f-social{display:flex;flex-direction:column;gap:8px}\n.f-social a{color:rgba(255,252,245,.55);text-decoration:none;font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;transition:color .2s}\n.f-social a:hover{color:var(--cream)}\n.footer-fine{max-width:1100px;margin:40px auto 0;border-top:1px solid rgba(255,252,245,.08);padding-top:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;font-size:12px;color:rgba(255,252,245,.28);letter-spacing:.05em}\n.footer-fine .tagline{font-family:'Playfair Display',serif;font-style:italic;font-size:14px;color:var(--bunker)}\n\n/* ===== REVEALS ===== */\n.reveal{opacity:0;transform:translateY(20px);transition:opacity .55s ease,transform .55s ease}\n.reveal.inview{opacity:1;transform:none}\n.rd1{transition-delay:.1s}.rd2{transition-delay:.2s}.rd3{transition-delay:.3s}\n@media(prefers-reduced-motion:reduce){#putt{display:none!important}.reveal{opacity:1;transform:none;transition:none}}\n\n/* ============ MOBILE FIRST OVERHAUL ============ */\n\n/* Hero -- tighten padding, center everything */\n@media(max-width:768px){\n  .hero-content{padding:100px 20px 0;text-align:center;align-items:center}\n  .hero .eyebrow{justify-content:center}\n  .hero .eyebrow::before{display:none}\n  .hero h1{font-size:clamp(34px,12vw,100px);white-space:normal}\n  .hero-stamp{font-size:12px;padding:9px 14px;flex-wrap:wrap;justify-content:center;gap:4px}\n  .hero-stamp .dot{display:none}\n  .hero .sub{font-size:15px;max-width:100%}\n  .hero-ctas{justify-content:center}\n  .hero-data{grid-template-columns:repeat(2,1fr)}\n}\n\n/* Nav mobile */\n@media(max-width:680px){\n  nav{padding:14px 20px}\n  .nav-logo{width:36px}\n  .btn{padding:10px 18px;font-size:12px}\n}\n\n/* Course stack mobile */\n@media(max-width:600px){\n  .stack a{padding:14px 4px}\n  .stack .venue{font-size:clamp(22px,6vw,36px)}\n  .stack .hole{font-size:12px;width:26px}\n  section.course{padding:56px 20px}\n}\n\n/* Scoring table mobile */\n@media(max-width:600px){\n  section.rules{padding:56px 20px}\n  .score-table .row{font-size:14px;padding:12px 14px}\n  .score-table .score{font-size:20px;min-width:44px}\n  .score-table .sh{padding:10px 14px;font-size:10px}\n}\n\n/* Photo strip mobile */\n@media(max-width:560px){\n  section.strip{grid-template-columns:1fr;height:auto}\n  section.strip figure{aspect-ratio:4/3;height:auto}\n}\n\n/* Ticket grid mobile -- single column, full width */\n@media(max-width:760px){\n  .ticket-grid{grid-template-columns:1fr;gap:16px}\n  .t-card{padding:22px 18px}\n  section.tickets{padding:56px 20px}\n}\n\n/* Charities mobile */\n@media(max-width:600px){\n  section.good{padding:56px 20px}\n  .charity-strip{gap:8px 10px}\n  .charity-strip span{font-size:11px;padding:6px 14px}\n}\n\n/* FAQ mobile */\n@media(max-width:600px){\n  section.faq{padding:56px 20px}\n  .faq-q-text{font-size:15px}\n}\n\n/* Back nine mobile */\n@media(max-width:600px){\n  .backnine{flex-direction:column;gap:16px;padding:36px 20px}\n  .backnine h3{font-size:20px}\n}\n\n/* Capture mobile */\n@media(max-width:600px){\n  section.capture{padding:56px 20px}\n  .email-form{max-width:100%}\n}\n\n/* Footer mobile */\n@media(max-width:600px){\n  .footer-row{flex-direction:column;gap:28px}\n  .footer-creed .creed{font-size:clamp(32px,10vw,72px)}\n}\n\n/* Intro mobile -- massive date fills screen */\n@media(max-width:600px){\n  #putt svg{width:min(24vw,100px)!important}\n  #putt .std-date{font-size:clamp(60px,20vw,120px)}\n  #putt .std-date .yr{font-size:clamp(68px,22vw,140px)}\n  #putt .wordmark{font-size:16px}\n  #putt .skip-hint{bottom:16px;right:16px;font-size:10px;padding:5px 12px}\n}\n\n/* Add to calendar button */\n.cal-btn{\n  display:inline-flex;align-items:center;gap:8px;\n  border:1.5px solid rgba(255,252,245,.3);\n  color:var(--cream);background:transparent;\n  font-family:'DM Sans',sans-serif;font-size:12px;\n  font-weight:700;letter-spacing:.14em;text-transform:uppercase;\n  padding:9px 18px;border-radius:999px;text-decoration:none;\n  opacity:0;animation:wordmarkIn .5s ease 4.2s forwards;\n  transition:background .2s,border-color .2s;\n  margin-top:4px\n}\n.cal-btn:hover{background:rgba(255,252,245,.1);border-color:rgba(255,252,245,.5)}\n\n/* Course stack -- remove par column when no pars */\n.stack a{align-items:center}\n\n/* General section padding tightening on mobile */\n@media(max-width:600px){\n  section.good,.rules .inner,.faq .inner{max-width:100%}\n  .section-h2{font-size:clamp(34px,9vw,60px)}\n  .section-serif{font-size:16px}\n}\n\n/* Ticker mobile */\n@media(max-width:480px){\n  .ticker-item{font-size:12px;padding:0 18px;gap:18px}\n}\n\n/* Story lead single line on mobile -- allow wrap */\n@media(max-width:600px){\n  .story .story-lead{white-space:normal;font-size:16px}\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- DUOTONE FILTER -->\n<svg class=\"dt-filter\" aria-hidden=\"true\">\n  <defs>\n    <filter id=\"duotone\" color-interpolation-filters=\"sRGB\">\n      <feColorMatrix type=\"saturate\" values=\"0\"><\u002FfeColorMatrix>\n      <feComponentTransfer>\n        <feFuncR type=\"table\" tableValues=\"0.118 0.961\"><\u002FfeFuncR>\n        <feFuncG type=\"table\" tableValues=\"0.227 0.941\"><\u002FfeFuncG>\n        <feFuncB type=\"table\" tableValues=\"0.196 0.910\"><\u002FfeFuncB>\n      <\u002FfeComponentTransfer>\n    <\u002Ffilter>\n  <\u002Fdefs>\n<\u002Fsvg>\n\n<!-- INTRO -->\n<div id=\"putt\" aria-hidden=\"true\">\n  <svg xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" viewBox=\"0 0 9450 10800\">\n    <g>\n<g style=\"\">\n\t\t<g class=\"gg-ink\">\n<path pathLength=\"1\" style=\"stroke: rgb(193,193,193); stroke-opacity: 1.00; stroke-width: 0; stroke-dasharray: none; stroke-linecap: butt; stroke-dashoffset: 0; stroke-linejoin: miter; stroke-miterlimit: 4; fill: rgb(50,78,53); fill-opacity: 1.00; fill-rule: nonzero; opacity: 1;\" transform=\"matrix(17.03888 0 0 17.03888 4724.999961 5399.999959) matrix(1 0 0 1 0 0)  translate(-125.081989, -132.899546)\" d=\"M 116.50 258.40 C 107.71 251.25 98.25 244.79 81.50 234.52 C 58.76 220.58 43.41 208.42 31.35 194.80 C -4.40 154.43 -8.84 102.68 20.90 73.05 C 32.71 61.29 45.93 an><\u002Fa>\n      <a href=\"#tickets\"><span class=\"hole\">03<\u002Fspan><span class=\"venue\">Duke's<\u002Fspan><span class=\"par\">Par 3 · 201 yd<\u002Fspan><\u002Fa>\n      <a href=\"#tickets\"><span class=\"hole\">04<\u002Fspan><span class=\"venue\">The Great Grizzly Bear<\u002Fspan><span class=\"par\">Par 3 · 277 yd<\u002Fspan><\u002Fa>\n      <a href=\"#tickets\"><span class=\"hole\">05<\u002Fspan><span class=\"venue\">Molly's in Soulard<\u002Fspan><span class=\"par\">Par 3 · 298 yd<\u002Fspan><\u002Fa>\n      <a href=\"#tickets\"><span class=\"hole\">06<\u002Fspan><span class=\"venue\">Hi-Hat<\u002Fspan><span class=\"par\">Par 4 · 324 yd<\u002Fspan><\u002Fa>\n      <a href=\"#tickets\"><span class=\"hole\">07<\u002Fspan><span class=\"venue\">Big Daddy's<\u002Fspan><span class=\"par\">Par 5 · 779 yd<\u002Fspan><\u002Fa>\n      <a href=\"#tickets\"><span class=\"hole\">08<\u002Fspan><span class=\"venue\">D's Place<\u002Fspan><span class=\"par\">Par 4 · 318 yd<\u002Fspan><\u002Fa>\n      <a href=\"#tickets\"><span class=\"hole\">09<\u002Fspan><span class=\"venue\">Hammerstone's<\u002Fspan><span class=\"par\">Par 5 · 548 yd<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n    <div class=\"after reveal rd3\">\n      <p class=\"after-note\"><em>2026 course in final review.<\u002Fem> Full lineup drops with ticket launch.<\u002Fp>\n      <a href=\"#tickets\" class=\"btn btn-primary\">Get on the Tee Sheet<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- STORY -->\n<section class=\"story\">\n  <div class=\"photo reveal\">\n    <img src=\"./story.jpg\" alt=\"TGG attendee celebrating at a hole mini-game\">\n    <div class=\"badge\">Year One · Soulard 2025<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"reveal rd2\">\n    <h2 class=\"section-h2\" style=\"font-size: 62px; line-height: .95; margin-bottom: 20px\">TURNS OUT ALL&nbsp;&nbsp;\nST. LOUIS NEEDED WAS A SCORECARD AND A GOOD CAUSE.<\u002Fh2>\n    <div class=\"record\">\n      <div class=\"rec-line\" style=\"font-size: 6px\">The course record is <span class=\"rec-num\">$20,634.<\u002Fspan><\u002Fdiv>\n      <div class=\"rec-line\" style=\"font-size: 32px; width: 474px\">Soulard. September 2025. Year One.<\u002Fdiv>\n      <div class=\"rec-line rec-challenge\" style=\"font-size: 42px\">It falls October 3.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PHOTO STRIP -->\n<section class=\"strip\">\n  <figure><img src=\"./strip1.jpg\" alt=\"TGG crowd at Soulard bar\"><\u002Ffigure>\n  <figure><img src=\"./strip2.jpg\" alt=\"TGG attendees in matching overalls at the event\"><\u002Ffigure>\n  <figure><img src=\"./strip3.jpg\" alt=\"TGG group outside Ray's Sportshouse Soulard\"><\u002Ffigure>\n<\u002Fsection>\n\n<!-- SCORING -->\n<section class=\"rules\" id=\"how\">\n  <div class=\"inner\">\n    <p class=\"section-eyebrow reveal\" style=\"font-size: 23px\">02 · How to Play<\u002Fp>\n    <h2 class=\"section-h2 reveal rd1\" style=\"font-size: 98px\">Compete Against<br>Your Friends.<\u002Fh2>\n    <span class=\"section-serif reveal rd2\" style=\"font-size: 36px\">Pick up your scorecard. Play all nine holes.&nbsp;<\u002Fspan>\n    <div class=\"score-table reveal rd2\">\n      <div class=\"sh\"><span>Activity<\u002Fspan><span>Strokes<\u002Fspan><\u002Fdiv>\n      <div class=\"row\"><span>Skip a bar entirely<\u002Fspan><span class=\"score s-bad\">+2<\u002Fspan><\u002Fdiv>\n      <div class=\"row\"><span>Visit a bar<\u002Fspan><span class=\"score\">+0<\u002Fspan><\u002Fdiv>\n      <div class=\"row\"><span>Order any drink <em>(mocktails count too)<\u002Fem><\u002Fspan><span class=\"score s-good\">-1<\u002Fspan><\u002Fdiv>\n      <div class=\"row\"><span>Play a sponsored mini-game or challenge<\u002Fspan><span class=\"score s-good\">-1<\u002Fspan><\u002Fdiv>\n      <div class=\"row\"><span>Order the hole's official sponsored drink<\u002Fspan><span class=\"score s-flag\">-2<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"mini-games reveal rd3\">\n      <div class=\"mg-icon\">⛰<\u002Fdiv>\n      <div class=\"mg-text\" style=\"font-size: 18px\">Mini-Games at Every Hole. Each bar has a sponsored game or challenge. Step up, play it, earn a stroke off your card. Some holes will make you look good. Others will not.&nbsp;<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"game-photo reveal rd3\">\n      <img src=\"./game.jpg\" alt=\"Attendee playing golf mini-game at a TGG hole\">\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 2-UP PHOTOS -->\n<div class=\"photo-two\">\n  <figure><img src=\"./twoup1.jpg\" alt=\"TGG attendees showing wristbands\"><\u002Ffigure>\n  <figure><img src=\"./twoup2.jpg\" alt=\"TGG attendees at outdoor Soulard bar\"><\u002Ffigure>\n<\u002Fdiv>\n\n<!-- CHARITIES -->\n<section class=\"good\" id=\"good\">\n  <p class=\"section-eyebrow reveal\" style=\"font-size: 20px\">03 · The Giving<\u002Fp>\n  <h2 class=\"section-h2 reveal rd1\" style=\"font-size: 102px\">$15 OF EVERY TICKET SALE\nWILL BENEFIT ONE OF THE\nFOLLOWING 9 LOCAL CHARITIES<\u002Fh2>\n  <span class=\"section-serif reveal rd2\" style=\"font-size: 26px\">The charity you choose at checkout determines&nbsp;who you support!&nbsp;<\u002Fspan>\n\n  <div class=\"charity-strip reveal rd3\">\n    <span style=\"font-size: 15px\">Stray Rescue STL<\u002Fspan>\n    <span style=\"font-size: 6px\">St. Louis Children's Hospital<\u002Fspan>\n    <span style=\"font-size: 15px\">Friends of Kids with Cancer<\u002Fspan>\n    <span style=\"font-size: 15px\">St. Jude<\u002Fspan>\n    <span style=\"font-size: 15px\">St. Louis Hero Network<\u002Fspan>\n    <span style=\"font-size: 15px\">Make-A-Wish Missouri<\u002Fspan>\n    <span style=\"font-size: 6px\">PGA Reach Gateway<\u002Fspan>\n    <span style=\"font-size: 15px\">STL Impact Baseball<\u002Fspan>\n    <span style=\"font-size: 6px\">Partner TBA<\u002Fspan>\n  <\u002Fdiv>\n  <p class=\"charity-note reveal rd3\" style=\"font-size: 6px\">* Final 9th partner announced with ticket launch.<\u002Fp>\n<\u002Fsection>\n\n<!-- TICKETS -->\n<section class=\"tickets\" id=\"tickets\">\n  <p class=\"section-eyebrow reveal\" style=\"font-size: 20px\">04 · Get On the Tee Sheet<\u002Fp>\n  <h2 class=\"section-h2 reveal rd1\">Your Hat Is<br>Your Ticket.<\u002Fh2>\n  <span class=\"section-serif reveal rd2\">Pick your charity, pick your color. Your hat decides who your ticket supports.<\u002Fspan>\n  <div class=\"ticket-grid\">\n    <div class=\"t-card featured reveal\">\n      <div class=\"t-badge hot\">This Is Your Ticket<\u002Fdiv>\n      <div class=\"t-name\">The 2026 Hat<\u002Fdiv>\n      <div class=\"t-price\">$45 <span>per person<\u002Fspan><\u002Fdiv>\n      <ul class=\"t-includes\">\n        <li>Official TGG team hat, your wristband and souvenir<\u002Fli>\n        <li>Event access all nine holes, 1 to 6 PM<\u002Fli>\n        <li>Physical scorecard for the day<\u002Fli>\n        <li>$15 of your ticket price goes directly to your chosen charity<\u002Fli>\n        <li>Mini-game access at every hole<\u002Fli>\n        <li>Green Jacket eligibility<\u002Fli>\n      <\u002Ful>\n      <a href=\"https://thegivinggreen.store\" class=\"btn btn-forest\" target=\"_blank\" rel=\"noopener\">Choose Your Team<\u002Fa>\n    <\u002Fdiv>\n    <div class=\"t-card reveal rd1\">\n      <div class=\"t-badge std\">Coming Soon<\u002Fdiv>\n      <div class=\"t-name\">Pro Shop<\u002Fdiv>\n      <div class=\"t-price\" style=\"font-size:clamp(20px,2.5vw,28px);color:var(--bunker)\">Hats &amp; Apparel<\u002Fdiv>\n      <ul class=\"t-includes\">\n        <li>Performance hats in multiple styles<\u002Fli>\n        <li>TGG tees and sweatshirts<\u002Fli>\n        <li>Available before and at the event<\u002Fli>\n      <\u002Ful>\n      <a href=\"#notify\" class=\"btn\" style=\"border:2px solid var(--line);color:var(--bunker);text-align:center;display:block\">Coming Soon<\u002Fa>\n    <\u002Fdiv>\n    <div class=\"t-card reveal rd2\">\n      <div class=\"t-badge std\">Groups<\u002Fdiv>\n      <div class=\"t-name\">Team of 10+<\u002Fdiv>\n      <div class=\"t-price\" style=\"font-size:clamp(20px,2.5vw,28px);color:var(--bunker)\">Contact Us<\u002Fdiv>\n      <ul class=\"t-includes\">\n        <li>Reserved group ticket block<\u002Fli>\n        <li>Corporate and group coordination<\u002Fli>\n        <li>Perfect for work outings and birthday groups<\u002Fli>\n      <\u002Ful>\n      <a href=\"mailto:admin@thegivinggreen.org\" class=\"btn\" style=\"border:2px solid var(--line);color:var(--bunker);text-align:center;display:block\">Get in Touch<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <p class=\"t-note reveal rd3\" style=\"font-size: 17px\">Tickets are priced at break-even. Every dollar of profit goes directly to our nine charity partners.<\u002Fp>\n<\u002Fsection>\n\n<!-- BACK NINE -->\n<div class=\"backnine\">\n  <div>\n    <h3>Then stay for the Back Nine.<\u002Fh3>\n    <p>The official afterparty at Paddy O's. 6 to 10 PM, right in the neighborhood.<\u002Fp>\n  <\u002Fdiv>\n  <a href=\"#notify\" class=\"btn-bn\">Back Nine Details<\u002Fa>\n<\u002Fdiv>\n\n<!-- FAQ -->\n<section class=\"faq\" id=\"faq\">\n  <div class=\"inner\">\n    <p class=\"section-eyebrow reveal\">Got Questions<\u002Fp>\n    <h2 class=\"section-h2 reveal rd1\">FAQs<\u002Fh2>\n    <span class=\"section-serif reveal rd2\">Everything you need to know before you tee off.<\u002Fspan>\n    <div class=\"faq-list reveal rd2\">\n      <div class=\"faq-item\"><button class=\"faq-q\" aria-expanded=\"false\"><span class=\"faq-q-text\">What is The Giving Green?<\u002Fspan><span class=\"faq-icon\">+<\u002Fspan><\u002Fbutton><div class=\"faq-a\"><p>TGG is St. Louis's charity pub golf crawl. Nine bars in Historic Soulard become nine holes on a golf course for one Saturday. You carry a physical scorecard, play games at each hole, compete for the lowest score, and raise money for nine local charities at the same time. The most fun you will have on a Saturday and the most painlessly you have ever supported nine great causes.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"faq-item\"><button class=\"faq-q\" aria-expanded=\"false\"><span class=\"faq-q-text\">What is included in my ticket?<\u002Fspan><span class=\"faq-icon\">+<\u002Fspan><\u002Fbutton><div class=\"faq-a\"><p>Every ticket is $45. Your hat is your wristband and your souvenir. $15 of that goes directly to the charity you choose at checkout. Your hat color is your team.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"faq-item\"><button class=\"faq-q\" aria-expanded=\"false\"><span class=\"faq-q-text\">How do I pick up my hat?<\u002Fspan><span class=\"faq-icon\">+<\u002Fspan><\u002Fbutton><div class=\"faq-a\"><p>Hat pickup details will be sent via email in the week before the event. We will have a designated pickup location in Soulard. You must wear your hat to access venues on event day.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"faq-item\"><button class=\"faq-q\" aria-expanded=\"false\"><span class=\"faq-q-text\">How does scoring work?<\u002Fspan><span class=\"faq-icon\">+<\u002Fspan><\u002Fbutton><div class=\"faq-a\"><p>Each hole has a featured sponsored drink and a mini-game or challenge. Order the featured drink and earn -2 strokes. Order any other drink and earn -1. Play the mini-game for -1. Skip a bar entirely and take +2. Carry your scorecard all day across all nine holes.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"faq-item\"><button class=\"faq-q\" aria-expanded=\"false\"><span class=\"faq-q-text\">How do the charities benefit?<\u002Fspan><span class=\"faq-icon\">+<\u002Fspan><\u002Fbutton><div class=\"faq-a\"><p>$15 of your $45 ticket goes directly to your chosen charity. The hat color you pick at checkout is how you choose which one.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"faq-item\"><button class=\"faq-q\" aria-expanded=\"false\"><span class=\"faq-q-text\">Where exactly is the event?<\u002Fspan><span class=\"faq-icon\">+<\u002Fspan><\u002Fbutton><div class=\"faq-a\"><p>The event takes place across nine bars in Historic Soulard, St. Louis. All bars are walkable within the neighborhood. The full course map drops with the ticket launch. The official afterparty is at Paddy O's from 6 to 10 PM.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"faq-item\"><button class=\"faq-q\" aria-expanded=\"false\"><span class=\"faq-q-text\">Do I need to know anything about golf?<\u002Fspan><span class=\"faq-icon\">+<\u002Fspan><\u002Fbutton><div class=\"faq-a\"><p>Not even a little bit. In Year One we had everyone from actual golfers to people who have never picked up a club having the same amount of fun. If you can carry a scorecard and order a drink you are qualified to play.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"faq-item\"><button class=\"faq-q\" aria-expanded=\"false\"><span class=\"faq-q-text\">Is there an age requirement?<\u002Fspan><span class=\"faq-icon\">+<\u002Fspan><\u002Fbutton><div class=\"faq-a\"><p>Yes. You must be 21 or older to attend. Valid ID is required at all venues. No exceptions.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"faq-item\"><button class=\"faq-q\" aria-expanded=\"false\"><span class=\"faq-q-text\">Can I bring a group?<\u002Fspan><span class=\"faq-icon\">+<\u002Fspan><\u002Fbutton><div class=\"faq-a\"><p>Absolutely. Each person in your group buys their own ticket and picks their team color. Email us at admin@thegivinggreen.org if you have a group of 10 or more.<\u002Fp><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- EMAIL CAPTURE -->\n<section class=\"capture\" id=\"notify\">\n  <p class=\"eyebrow\">Tickets Drop This Fall<\u002Fp>\n  <h2>Get On<br>the Card<\u002Fh2>\n  <p class=\"sub\">Be first on the tee sheet. Early access, course updates, and everything you need before October 3.<\u002Fp>\n  <form class=\"email-form\" onsubmit=\"handleSubmit(event)\">\n    <input type=\"email\" id=\"email-input\" placeholder=\"your@email.com\" required=\"\" autocomplete=\"email\">\n    <button type=\"submit\">Notify Me<\u002Fbutton>\n  <\u002Fform>\n  <p id=\"form-msg\"><\u002Fp>\n  <p class=\"fine\">No spam. One email when tickets drop.<\u002Fp>\n<\u002Fsection>\n\n<!-- FOOTER -->\n<footer>\n  <div class=\"footer-creed\">\n    <div class=\"creed\">The Giving Green 2<span class=\"zero\"><svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"2550 3090 4350 4620\" aria-hidden=\"true\"><g><g><g style=\"fill:rgb(50,78,53);fill-opacity:1;stroke:none;\" transform=\"matrix(17.03888 0 0 17.03888 4724.999961 5399.999959) matrix(1 0 0 1 0 0) translate(-125.081989,-132.899546)\"><path d=\"M 116.50 258.40 C 107.71 251.25 98.25 244.79 81.50 234.52 C 58.76 220.58 43.41 208.42 31.35 194.80 C -4.40 154.43 -8.84 102.68 20.90 73.05 C 32.71 61.29 45.93 56.00 63.52 56.00 C 75.37 56.00 85.52 58.32 96.53 63.55 C 100.53 65.45 104.08 67.00 104.40 67.00 C 105.37 67.00 105.12 58.07 103.37 30.19 C 102.12 10.44 102.00 3.60 102.86 2.74 C 104.36 1.24 117.89 0.31 125.50 1.19 C 128.80 1.57 137.12 3.55 144.00 5.58 C 164.44 11.62 167.04 12.13 177.75 12.20 C 183.39 12.23 188.00 12.58 188.00 12.97 C 188.00 13.37 186.27 16.37 184.15 19.65 C 176.86 30.93 169.33 35.02 151.18 37.57 C 137.11 39.54 136.34 39.76 130.00 43.55 C 119.88 49.61 119.55 50.25 119.17 64.95 L 118.85 77.75 L 122.03 81.38 C 123.78 83.37 125.60 85.00 126.07 85.00 C 126.55 85.00 129.92 82.06 133.56 78.47 C 147.41 64.83 160.91 58.15 179.07 55.94 C 211.36 52.01 238.71 71.75 247.13 105.05 C 248.94 112.20 249.17 115.30 248.71 126.46 C 248.08 141.94 246.04 149.96 239.03 164.50 C 225.42 192.73 201.80 215.66 164.21 237.17 C 151.30 244.55 134.68 256.40 129.56 261.86 C 127.95 263.59 126.15 264.98 125.56 264.95 C 124.98 264.93 120.90 261.98 116.50 258.40 Z\"><\u002Fpath><\u002Fg><g style=\"fill:rgb(113,141,88);fill-opacity:1;stroke:none;\" transform=\"matrix(17.03888 0 0 17.03888 4724.999961 5399.999959) matrix(1 0 0 1 -0.081552 9.36477) translate(-125.000437,-142.264315)\"><path d=\"M 58.50 207.80 C 43.04 199.73 26.93 181.80 17.98 162.69 C 4.75
